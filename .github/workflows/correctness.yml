name: Correctness

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  correctness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libopenmpi-dev openmpi-bin

      - name: Build all
        run: |
          mkdir -p bin
          gcc serial/grid_serial.c  -o bin/serial  -lm
          gcc openmp/grid_openmp.c  -fopenmp -o bin/openmp -lm
          mpicc mpi/grid_mpi.c      -o bin/mpi     -lm

      # OpenMP uses shared memory — result must match serial exactly
      - name: OpenMP matches serial (small dataset)
        run: |
          s=$(./bin/serial data/small.txt | grep "Total Demand Served")
          o=$(OMP_NUM_THREADS=4 ./bin/openmp data/small.txt | grep "Total Demand Served")
          echo "Serial : $s"
          echo "OpenMP : $o"
          sv=$(echo "$s" | grep -oP '[\d.]+(?= /)' | head -1)
          ov=$(echo "$o" | grep -oP '[\d.]+(?= /)' | head -1)
          [ "$sv" = "$ov" ] && echo "PASS" || { echo "FAIL: OpenMP $ov != serial $sv"; exit 1; }

      - name: OpenMP matches serial (medium dataset)
        run: |
          s=$(./bin/serial data/medium.txt | grep "Total Demand Served")
          o=$(OMP_NUM_THREADS=4 ./bin/openmp data/medium.txt | grep "Total Demand Served")
          echo "Serial : $s"
          echo "OpenMP : $o"
          sv=$(echo "$s" | grep -oP '[\d.]+(?= /)' | head -1)
          ov=$(echo "$o" | grep -oP '[\d.]+(?= /)' | head -1)
          [ "$sv" = "$ov" ] && echo "PASS" || { echo "FAIL: OpenMP $ov != serial $sv"; exit 1; }

      # MPI partitions supply across ranks — result approximates serial
      # but won't match exactly due to independent graph copies and BFS ordering.
      # Verify it is deterministic and physically consistent (served <= demand).
      - name: MPI is deterministic and physically valid (small dataset)
        run: |
          r1=$(mpirun -np 4 --oversubscribe ./bin/mpi data/small.txt | grep "Total Demand Served")
          r2=$(mpirun -np 4 --oversubscribe ./bin/mpi data/small.txt | grep "Total Demand Served")
          echo "Run 1: $r1"
          echo "Run 2: $r2"
          [ "$r1" = "$r2" ] && echo "PASS: deterministic" || { echo "FAIL: non-deterministic"; exit 1; }
          served=$(echo "$r1" | grep -oP '[\d.]+(?= /)' | head -1)
          demand=$(echo "$r1" | grep -oP '(?<= /)[\d.]+' | head -1)
          python3 -c "
          s,d = float('$served'), float('$demand')
          assert s <= d + 0.01, f'served {s} > demand {d}'
          print(f'PASS: served {s} <= demand {d}')
          "

      - name: MPI is deterministic and physically valid (medium dataset)
        run: |
          r1=$(mpirun -np 4 --oversubscribe ./bin/mpi data/medium.txt | grep "Total Demand Served")
          r2=$(mpirun -np 4 --oversubscribe ./bin/mpi data/medium.txt | grep "Total Demand Served")
          echo "Run 1: $r1"
          echo "Run 2: $r2"
          [ "$r1" = "$r2" ] && echo "PASS: deterministic" || { echo "FAIL: non-deterministic"; exit 1; }
          served=$(echo "$r1" | grep -oP '[\d.]+(?= /)' | head -1)
          demand=$(echo "$r1" | grep -oP '(?<= /)[\d.]+' | head -1)
          python3 -c "
          s,d = float('$served'), float('$demand')
          assert s <= d + 0.01, f'served {s} > demand {d}'
          print(f'PASS: served {s} <= demand {d}')
          "
